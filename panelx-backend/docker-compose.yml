services:
  # ── PostgreSQL 16 + PostGIS ───────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567890
      POSTGRES_DB: panelx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d panelx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"       # S3-compatible API
      - "9001:9001"       # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ───────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:1234567890@db:5432/panelx_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    # Override entrypoint so the worker skips alembic migrations entirely
    entrypoint: ["celery"]
    command: ["-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:1234567890@db:5432/panelx_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (optional scheduler) ─────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    # Override entrypoint so beat skips alembic migrations entirely
    entrypoint: ["celery"]
    command: ["-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:1234567890@db:5432/panelx_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
